<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrika</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="icon" type="image/svg+xml" href="entrika-icon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="popup-container">
    <header class="popup-header" id="title-card">
      <img src="entrika-logo.svg" height="30" alt="Entrika" class="popup-logo">
    </header>

    <div id="analysis-card">
      <div class="popup-hero">
        <p class="popup-company-label" id="risk-analysis">—</p>
        <span class="website-url popup-url" id="website-url"></span>
        <p class="popup-risk-hero" id="risk-badge">—</p>
      </div>

      <section class="popup-section">
        <!-- <div>⛔</div> -->
        <h6 class="popup-section-label">⛔ Privacy Analysis</h6>
        <p class="popup-section-body" id="privacy-analysis">—</p>
      </section>

      <section class="popup-section">
        <!-- <div>🔏</div> -->
        <h6 class="popup-section-label">🔏 Privacy Summary</h6>
        <p class="popup-section-body" id="privacy-summary">—</p>
      </section>
    </div>

    <div id="tos-card">
      <section class="popup-section">
        <!-- <div>📃</div> -->
        <h6 class="popup-section-label">📃 Terms of Service</h6>
        <p class="popup-section-body" id="tos-summary">—</p>
      </section>
    </div>

    <div class="popup-actions buttons-container">
      <a href="#" id="company-link" target="_blank" class="popup-link">View company</a>
      <a href="#" id="registration-link" target="_blank" class="popup-link">Register</a>
    </div>
    <div class="text-center">
      <a href="#" id="dashboard-link" target="_blank" class="d-none popup-link" style="margin: 0 12px 16px;">View dashboard</a>
    </div>

      <!-- <a href="#", target="_blank" class="d-none justify-content-center mb-3" id="dashboard-link">Go to dashboard</a> -->
    <button class="d-none popup-link" id="get-analysis">Run analysis for this company</button>
  </div>
    <script type="text/javascript" src="javascript/popup.js"></script>
  </body>
</html>
